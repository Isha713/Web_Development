<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
            .container{
                border: solid black 5px;
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
            }
        .box1{
            background-color: rgb(219, 219, 172);
            width: 400px;
            height: 400px;
            border: solid black 5px;
            
        }
        .box2{
            background-color: rgb(255, 239, 242);
            width: 400px;
            height: 400px;
            border: solid black 5px;
            
        }
        @media (min-width:500px){
            .box1{
                background-color: rgb(228, 35, 71);
                border: solid rgb(94, 7, 246) 5px;
            }
        }

        @media (min-width: 300px) and (max-width: 500px){
            .box2{
                background-color: rgb(78, 185, 64);
                border: solid rgb(14, 1, 1) 5px;
            }
        }
    </style>    
</head>
<body>
    <div class="container">
        <div class="box1">Hello</div>
        <div class="box2">World</div>
    </div>
</body>
</html>
