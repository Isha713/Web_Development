<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

       .container{
        border: solid black 5px;
        display: flex;
        height: 425px;
        width: 450px;
        align-items:center;
        padding:10px;
        background-color: antiquewhite;
       }

       .item1{
        border: solid black 2px;
        background-color: rgb(224, 155, 169);
        height: 200px;
        width: 200px;
         display: flex;
        flex-direction: column;
        justify-content: space-around;
        
       }
       .item1_1, .item1_2{
        margin: 5px;
        padding:5px;
        border: solid black 2px;
       }

       .item2{
        margin: 5px;
        padding:5px;
        background-color: yellow;;
        border: solid black 2px;
        height: 200px;
        width: 200px;
       }

       @media (min-width: 640px) {
            .container {
                flex-direction: row;
                justify-content: space-around;
            }
        }

        @media (max-width: 640px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1">
            <div class="item1_1">ITEM1.1</div>
            <div class="item1_2">ITEM1.2</div>
        </div>
        <div class="item2">
            <img 
                src="strawberry.jpg" 
                alt="Strawberry"
                height="200px"
                width="200px"
            >
        </div>
    </div>
</body>
</html>
