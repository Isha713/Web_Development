<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: beige;
            border: solid black 5px;
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: rgb(184, 184, 204);
            border-radius: 5px;
            margin: 10px;
            border:  solid black 3px;
            position: relative;
            animation-name: rightMovement;
            animation-duration: 5s;
            animation-iteration-count: 1;
            animation-delay: 1s;
            animation-timing-function: linear;
            /*animation-timing-function: cubic-bezier(0.1, 0.7, 1.0, 0.1);*/
            /*animation-direction: alternate; doesnot break*/
            /*animation-direction: alternate-reverse; destination to source and source to destination*/
            /*animation-fill-mode: forwards; /*what to do after the last frame -- stops at the last frame*/
            /*animation-fill-mode: backwards; /*what to do before the first frame -- stops at the first frame*/
            animation-fill-mode: both; /*stops at the first and last frame*/  

            /*Short Hand Notation*/
            animation: 5s linear 1s infinite alternate none running rightMovement;

        }
        @keyframes rightMovement {
            from{
                top: 0;
                left:0;
            }

            to{
                top: 0;
                left: 1530px;
            }
        }

        #box2{
            width: 350px;
            height: 80px;
            background-color: rgb(184, 184, 204);
            border-radius: 5px;
            margin: 10px;
            border:  solid black 3px;
            position: relative;
            animation: 5s ease-in 1s infinite alternate none running leftMovement;
        }

        @keyframes leftMovement {
            from{
                top: 680px;
                left:1350px;
            }

            to{
                top: 680px;
                left: 0px;
            }
        }

        #circle{
            width: 150px;
            height: 150px;
            background-color: rgb(184, 184, 204);
            border-radius: 50%;
            margin: 10px;
            border:  solid black 3px;
            position: relative;
            top: 20%;
            left: 40%;
            animation: 10s ease-in-out 0s infinite alternate-reverse none running circleMovement;
        }
        @keyframes circleMovement {
           0%{
            top:1%;
            left:2%
           }
           30%{
            top:5%;
            left:90%
           }
           60%{
            top:90%;
            left:10%
           }
           100%{
            top: 75%;
            left:90%
           }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>

        <div id="box2"></div>

        <div id="circle"></div>
    </div>
</body>
</html>
