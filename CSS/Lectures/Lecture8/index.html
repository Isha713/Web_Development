<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box</title>
    <style>
        .container{     
            background-color: beige;
            border: solid black 5px;
            margin: 2px;
            padding: 2px;
            display: flex;
            flex-direction: row;
            /*flex-direction: column-reverse; comes in reverse order in column */
            /*flex-wrap: wrap;*/
            height: 1200px;
            /*flex-wrap: nowrap;*/
           /* justify-content: center;*/
            justify-content: start;
            /*justify-content: end;*/
            /*justify-content: space-between; extreme left and right boxes are placed at the extree corners
            justify-content: space-around; equals space around each box
            */
            /*flex-flow: row wrap; Shorthand property for flex-direction and flex-wrap */
            /*align-items: center;aligns items vertically in the center*/
            /*align-items: stretch; stretches items to fill the container vertically*/
            
            align-items: start;
            align-content: start;

            /*align-content: center;aligns rows in the center when there are multiple rows*/
            /*align-content: space-between; extreme top and bottom rows are placed at the extreme corners*/
        }
        .box{
            /*height: 200px;
            width: 200px;*/
            border: solid red 2px;
            margin: 2px;
            padding: 2px;
        }
        #box1{
            background-color: aqua;
            order:500 ;
            /*flex-shrink: 4;*/
            /*flex-grow: 1;*/
            /*flex: 1 1 200px; /*flex-grow flex-shrink flex-basis*/
            align-self: center;
        }
        #box2{
            background-color: blueviolet;
            /*flex-grow: 1;*/
            align-self: end;
            
        }
        #box3{
            background-color: orange;
            /*flex-grow: 1;*/
        }
        #box4{
            background-color: brown;
            order: -1;
            /*flex-grow: 1;*/
            /*flex-basis: 400px;*/
        
        }

        
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">Box 1</div>
        <div class="box" id="box2">Box 2</div>
        <div class="box" id="box3">Box 3</div>
        <div class="box" id="box4">Box 4</div>
    </div>

    
</body>
</html>
