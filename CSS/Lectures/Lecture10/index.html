<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SHADOW EFFECT</title>
    <style>
        :root{
            --primary-color:brown;
            --custom-width:330px;
        }
        .container{
            background-color: beige;
            height:650px;
            border: solid black 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            /* Local Custom variables
            --primary-color:brown;
            --custom-width:330px;*/

            background-color: aquamarine;
            width: var(--custom-width);
            height: 330px;
            border: solid var(--primary-color) 3px;
            margin: 5px;
            padding: 5px;
            /*box-shadow: 10px 15px green;  offset(right)  y offset(bottom)  color
            box-shadow: -30px -45px red; */

            /*box-shadow: 10px 25px 54px rgb(30, 15, 240); Blur radius*/

            /*box-shadow: 10px 20px 5px 20px brown ; spread radius*/

            /*box-shadow: inset 10px 15px blueviolet; shadow inside the box*/

            box-shadow: 10px 20px red, 20px 40px var(--primary-color);

        }
        #head1{
            /*text-shadow: 12px 13px 1px white; x y b;lur-radius color*/

            /*text-shadow: yellow 2px 3px 1px;*/

            /*text-shadow: white 12px 13px;*/

            text-shadow: 2px 3px;
            text-shadow: 2px 3px red, 4px 6px blue, 6px 9px var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img 
                src="../Lecture9/strawberry.jpg" 
                alt="image"
                height="100px"
                width="100%"
            >
            <h2 id="head1">Strawberry Image</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Impedit error provident, consectetur vel corrupti soluta illum molestias nobis commodi incidunt, pariatur, earum veritatis laboriosam quasi.</p>
        </div>
    </div>
</body>
</html>
