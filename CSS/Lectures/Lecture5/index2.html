<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #img1{
            border: solid black 4px;
            padding: 5px;
            margin-top: 200px;
            width: 250px;
            height: 250px;
            border-radius: 5px;
            /*position: fixed;*/
        }
        #img2{
            border: solid black 4px;
            padding: 5px;
            margin: 2px;
            width: 250px;
            height: 250px;
            border-radius: 5px;
            position: sticky;
            top: 100px;
        }
        #img3{
            border: solid black 4px;
            padding: 5px;
            margin: 2px;
            width: 250px;
            height: 250px;
            border-radius: 5px;
            position: relative;
            top: 100px;
        }
        #img4{
            border: solid black 4px;
            padding: 5px;
            margin: 2px;
            width: 250px;
            height: 250px;
            border-radius: 5px;
            position: absolute;
            top: 120px;
            left: 100px;
        }
        .class{
            background-color: rgb(219, 219, 172);
            height: 5000px;
            width: 100%;
        }
        .class2{
            background-color: rgb(255, 239, 242);
            height: 8000px;
            width: 100%;
        }

    </style>
</head>
<body>
    <div class="class">
        <img id="img1"  src="img1.jpg" alt="img1">
        <img id="img2" src="img2.webp" alt="img2">
        <img id="img3" src="img3.webp" alt="img3">
        <img id="img4" src="img4.png" alt="img4">
    </div>

    <div class="class2">

    </div>
    
</body>
</html>
