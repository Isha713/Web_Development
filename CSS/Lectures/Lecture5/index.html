<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS POSITION</title>

    <style>
        div{
            border: solid red 5px;
            
        }
        img{
            border: solid black 5px;
            border-radius: 10px;
            margin: 18px;
            padding: 10px;
        }
        .image2{
            /*position: relative;
            top: 100px  ;
            left: 100px;*/

            position: absolute;
            top: 100px;
            
        }
        .image4{
            position: fixed;
        }
        .container{
            position: relative;
            height: 8000px;
        }
        .image3{
            position: sticky;
            top: 100px;
        }
        .box{
            background-color: rgb(235, 203, 209);
            height: 5000px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img 
            src="img1.jpg" 
            height="300" 
            width="300" 
            alt="image1"
            class="image1"
        />

        <img 
            src="img2.webp" 
            height="300" 
            width="300" 
            alt="image2"
            class="image2";
        />

        <img 
            src="img3.webp" 
            height="300" 
            width="300" 
            alt="image3"
            class="image3"
        />

        <img 
            src="img4.png" 
            height="300" 
            width="300" 
            alt="image4"
            class="image4"
        >
        
    </div>
    <div class="box">

    </div>
</body>
</html>
